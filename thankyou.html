<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Mukthi Ayurveda</title>
  <style>
    :root {
      --primary: #2E7D32;
      --secondary: #4CAF50;
      --light-bg: #f8faf8;
    }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 80px 20px; 
      background-color: var(--light-bg); 
      color: #333; 
    }
    .container { 
      max-width: 500px; 
      margin: auto; 
      background: white; 
      padding: 40px; 
      border-radius: 15px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      border-top: 5px solid var(--primary);
    }
    h1 { color: var(--primary); margin-top: 0; }
    p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
    .btn { 
      background: var(--primary); 
      color: white; 
      padding: 12px 30px; 
      text-decoration: none; 
      border-radius: 8px; 
      font-weight: bold; 
      display: inline-block;
      transition: background 0.3s;
    }
    .btn:hover { background: #1B5E20; }
    .icon { font-size: 50px; color: var(--secondary); margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✔</div>
    <h1>Booking Received!</h1>
    <p>Thank you for choosing Mukthi Ayurveda. Your details have been sent to <strong>Dr. Muhammed Fahique</strong>. We will contact you shortly to confirm your appointment time.</p>
    <a href="index.html" class="btn">Return to Home</a>
  </div>
</body>
</html>
